<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Column Design Sample</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link
      rel="stylesheet"
      href="style.css"
    />
  </head>

  <body>

      <div class="container-fluid">
        <div class="row">
          <div class="col-lg-3 col-left">
            <div class="sidebar-item">
              <span class="material-symbols-outlined icon">
                Home
              </span>
            <span class="sidebar-text">Home</span>
          </div>  

          <div class="sidebar-item">
            <span class="material-symbols-outlined icon">search</span>
            <span class="sidebar-text">Search</span>
          </div>

          <div class="sidebar-item">
            <span class="material-symbols-outlined icon">notifications</span>
            <span class="sidebar-text">Notifications</span>
          </div>

          <div class="sidebar-item">
            <span class="material-symbols-outlined icon">chat</span>
            <img>
            <span class="sidebar-text">Chat</span>
          </div>

          <div class="sidebar-item">
            <span class="material-symbols-outlined icon"> support_agent </span>
            <span class="sidebar-text">Agent</span>
          </div>

          <div class="sidebar-item">
            <span class="material-symbols-outlined icon">stars</span>
            <span class="sidebar-text">Premium</span>
          </div>

          <div class="sidebar-item">
            <span class="material-symbols-outlined icon"> person </span>
            <span class="sidebar-text">Profile</span>
          </div>

           <div class="sidebar-item">
            <span class="material-symbols-outlined icon"> pending </span>
            <span class="sidebar-text">More</span>
          </div>
            <button class="buttons">Button</button>

          </div>
          <div class="col-lg-5 col-center">
           Main Content
          </div>
          <div class="col-lg-4 col-right">
           <input class="buttons" placeholder="Search"/>
           </div>
            

          </div>
          </div>
        </div>

    
  </body>
</html>
